services:
  gripl-frontend:
    build:
      context: ./gripl/gripl-frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: https://gripl.merten.tech/api
    image: mertend/gripl-frontend:latest
    container_name: gripl-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_BASE_URL=https://gripl.merten.tech/api
    labels:
      - traefik.enable=true
      - traefik.http.routers.gripl-frontend.rule=Host(`www.gripl.merten.tech`) || Host(`gripl.merten.tech`)
      - traefik.http.routers.gripl-frontend.entrypoints=websecure
      - traefik.http.routers.gripl-frontend.tls=true
      - traefik.http.routers.gripl-frontend.tls.certresolver=le-merten
      - traefik.docker.network=web
      - traefik.http.services.gripl-frontend.loadbalancer.server.port=3000
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - web

  gripl-backend:
    build:
      context: ./gripl/gripl-backend
      dockerfile: Dockerfile
    image: mertend/gripl-backend:latest
    container_name: gripl-backend
    restart: unless-stopped
    depends_on:
      - gripl-postgres
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - PLAYWRIGHT_BROWSERS_PATH=/root/.cache/ms-playwright
      - FRONTEND_BASE_URL=https://gripl.merten.tech
    env_file:
      - ./gripl/gripl-backend/.env
    labels:
      - traefik.enable=true
      - traefik.http.routers.gripl-backend.rule=Host(`www.gripl.merten.tech`) && PathPrefix(`/api/`) || Host(`gripl.merten.tech`) && PathPrefix(`/api/`)
      - traefik.http.routers.gripl-backend.entrypoints=websecure
      - traefik.http.routers.gripl-backend.tls=true
      - traefik.http.routers.gripl-backend.tls.certresolver=le-merten
      - traefik.docker.network=web
      - traefik.http.middlewares.gripl-backend-strip-prefix.stripprefix.prefixes=/api
      - traefik.http.routers.gripl-backend.middlewares=gripl-backend-strip-prefix
      - traefik.http.services.gripl-backend.loadbalancer.server.port=8080
      - com.centurylinklabs.watchtower.enable=true
    volumes:
      - playwright-browsers:/root/.cache/ms-playwright
    networks:
      - web

  gripl-postgres:
    image: postgres:15
    container_name: gripl-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - gripl-postgres-data:/var/lib/postgresql/data
    networks:
      - web

  pgadmin:
    image: dpage/pgadmin4:7
    container_name: gripl-pgadmin
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - gripl-postgres
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.gripl-pgadmin-auth.basicauth.users=${PGADMIN_BASIC_AUTH}
      - traefik.http.routers.gripl-pgadmin.rule=Host(`pgadmin.gripl.merten.tech`)
      - traefik.http.routers.gripl-pgadmin.entrypoints=websecure
      - traefik.http.routers.gripl-pgadmin.tls=true
      - traefik.http.routers.gripl-pgadmin.tls.certresolver=le-merten
      - traefik.docker.network=web
      - traefik.http.services.gripl-pgadmin.loadbalancer.server.port=80
      - traefik.http.routers.gripl-pgadmin.middlewares=gripl-pgadmin-auth
      - com.centurylinklabs.watchtower.enable=true
    volumes:
      - gripl-pgadmin-data:/var/lib/pgadmin
    networks:
      - web

networks:
  web:
    external: true

volumes:
  playwright-browsers:
  gripl-postgres-data:
  gripl-pgadmin-data:
