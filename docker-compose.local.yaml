services:
  gripl-frontend:
    build:
      context: ./gripl/gripl-frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: http://localhost:8080
    container_name: gripl-frontend-local
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
    ports:
      - "3000:3000"
    networks:
      - local

  gripl-backend:
    build:
      context: ./gripl/gripl-backend
      dockerfile: Dockerfile
    container_name: gripl-backend-local
    restart: unless-stopped
    depends_on:
      - gripl-postgres
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://gripl-postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - PLAYWRIGHT_BROWSERS_PATH=/root/.cache/ms-playwright
      - FRONTEND_BASE_URL=http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - playwright-browsers:/root/.cache/ms-playwright
    networks:
      - local

  gripl-postgres:
    image: postgres:15
    container_name: gripl-postgres-local
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - gripl-postgres-data-local:/var/lib/postgresql/data
    networks:
      - local

  pgadmin:
    image: dpage/pgadmin4:7
    container_name: gripl-pgadmin-local
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - gripl-postgres
    ports:
      - "5050:80"
    volumes:
      - gripl-pgadmin-data-local:/var/lib/pgadmin
    networks:
      - local

networks:
  local:
    driver: bridge

volumes:
  playwright-browsers:
  gripl-postgres-data-local:
  gripl-pgadmin-data-local:
